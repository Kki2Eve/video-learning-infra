retargeting:
  type: DexPilot
  urdf_path: revo2_hand/revo2_right_hand.urdf

  target_joint_names: [
    'right_thumb_metacarpal_joint',
    'right_thumb_proximal_joint',
    'right_index_proximal_joint',
    'right_middle_proximal_joint',
    'right_ring_proximal_joint',
    'right_pinky_proximal_joint'
  ]

  wrist_link_name: "right_base_link"

  finger_tip_link_names: [
    "right_thumb_tip_link",
    "right_index_tip_link",
    "right_middle_tip_link",
    "right_ring_tip_link",
    "right_pinky_tip_link"
  ]

  scaling_factor: 1.0

  low_pass_alpha: 0.2

  project_dist: 0.035  # Distance threshold to trigger grasp optimization (forces fingers to close when near).
  escape_dist: 0.05  # Distance threshold to release grasp optimization (allows fingers to separate).